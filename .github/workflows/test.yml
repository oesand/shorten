name: Tests 🛠️

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: 📦 Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26.0

      - name: 🛠️ Tests
        run: make test
